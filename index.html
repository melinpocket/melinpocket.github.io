<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Melinpocket — 독서 기록</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Serif+KR:wght@300;400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/main.css" />
</head>
<body>

  <!-- NAV -->
  <nav>
    <a class="nav-logo" href="#">Melinpocket</a>
    <ul class="nav-links">
      <li><a href="#">기록</a></li>
      <li><a href="#">통계</a></li>
      <li><a href="#">서재</a></li>
      <li><a href="#">노트</a></li>
    </ul>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-left">
      <span class="hero-eyebrow">독서 기록장</span>
      <h1>읽고,<br>느끼고,<br><em>기억하다.</em></h1>
      <p class="hero-sub">
        다연이의 독서기록
      </p>
      <div class="hero-actions">
        <a href="#" class="btn-primary">기록 시작하기</a>
        <a href="#" class="btn-ghost">서재 보기</a>
      </div>
    </div>
    <div class="hero-right">
      <div class="book-visual">
        <div class="book-card"></div>
        <div class="book-card"></div>
        <div class="book-card"></div>
      </div>
    </div>
  </section>

  <!-- STATS -->
  <div class="stats">
    <div class="stat-item">
      <div class="stat-number">0</div>
      <div class="stat-label">올해 읽은 책</div>
    </div>
    <div class="stat-item">
      <div class="stat-number">???</div>
      <div class="stat-label">저장된 문장</div>
    </div>
    <div class="stat-item">
      <div class="stat-number">???</div>
      <div class="stat-label">누적 독서 페이지</div>
    </div>
  </div>

  <!-- RECENT BOOKS -->
  <section class="section">
    <div class="section-header">
      <h2 class="section-title">최근 기록</h2>
      <a href="#" class="section-link">모두 보기</a>
    </div>
    <div class="books-grid">
      <div class="book-entry">
        <div class="book-thumb t6"></div>
        <div class="book-info">
          <div class="book-title">파친코</div>
          <div class="book-author">이민진</div>
          <div class="book-rating">
            <div class="dot filled"></div><div class="dot filled"></div>
            <div class="dot filled"></div><div class="dot filled"></div>
            <div class="dot filled"></div>
          </div>
          <div class="book-date">2025년 1월 12일</div>
        </div>
      </div>

    </div>
  </section>

  <!-- MONTHLY LOG -->
  <section class="log-section">
    <div class="log-grid">
      <div class="log-intro">
        <h2 class="section-title">월별 기록</h2>
        <p>독서 목표입니다.</p>
        <a href="#" class="section-link" style="align-self: flex-start; margin-top: 8px;">전체 통계</a>
      </div>
      <div class="month-list">
        <div class="month-row">
          <div class="month-name">3월</div>
          <div class="month-bar-wrap"><div class="month-bar" style="width:70%"></div></div>
          <div class="month-count">7권</div>
        </div>
        <div class="month-row">
          <div class="month-name">2월</div>
          <div class="month-bar-wrap"><div class="month-bar" style="width:50%"></div></div>
          <div class="month-count">5권</div>
        </div>
        <div class="month-row">
          <div class="month-name">1월</div>
          <div class="month-bar-wrap"><div class="month-bar" style="width:90%"></div></div>
          <div class="month-count">9권</div>
        </div>
        <div class="month-row">
          <div class="month-name">12월</div>
          <div class="month-bar-wrap"><div class="month-bar" style="width:60%"></div></div>
          <div class="month-count">6권</div>
        </div>
        <div class="month-row">
          <div class="month-name">11월</div>
          <div class="month-bar-wrap"><div class="month-bar" style="width:40%"></div></div>
          <div class="month-count">4권</div>
        </div>
        <div class="month-row">
          <div class="month-name">10월</div>
          <div class="month-bar-wrap"><div class="month-bar" style="width:80%"></div></div>
          <div class="month-count">8권</div>
        </div>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    <div class="footer-logo">Melinpocket</div>
  </footer>

</body>
</html>
